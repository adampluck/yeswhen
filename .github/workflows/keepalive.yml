# Supabase free-tier projects pause after ~1 week without API activity,
# which would kill every existing event link. This pings a no-op RPC twice a
# week so that never happens.
#
# Note: GitHub disables scheduled workflows in repos with no activity for 60
# days — if you stop committing, re-enable it from the Actions tab now and
# then, or use a free external pinger (e.g. cron-job.org) instead.

name: Keep Supabase awake

on:
  schedule:
    - cron: '17 9 * * 1,4' # Mondays and Thursdays, 09:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: |
          curl --fail --silent --show-error -X POST \
            "${{ vars.VITE_SUPABASE_URL }}/rest/v1/rpc/yw_ping" \
            -H "apikey: ${{ vars.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_ANON_KEY }}"
